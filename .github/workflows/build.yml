name: Build Thesis PDF
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v2
        with:
          root_file: main.tex
          latexmk_use_xelatex: true
          # 增加 -interaction=nonstopmode 忽略一些非致命字体错误
          # 增加 -file-line-error 方便定位报错行号
          args: "-interaction=nonstopmode -halt-on-error -file-line-error"

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: thesis-pdf
          path: main.pdf

      - name: Create Release Zip
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          git archive --format=zip HEAD -o muc-thesis-v${{ github.ref_name }}.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            main.pdf
            muc-thesis-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

